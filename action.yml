name: 'Setup Elide'
description: 'Sets up the Elide runtime within GitHub Actions'
author: 'Elide'
branding:
  color: purple
  icon: arrow-down-circle

inputs:
  version:
    description: 'Version'
    required: false
    default: 'latest'

  channel:
    description: 'Channel'
    required: false
    default: 'nightly'

  os:
    description: 'OS'
    required: false

  arch:
    description: 'Architecture'
    required: false

  installer:
    description: 'Installation method: archive, shell, msi, pkg, apt, or rpm'
    required: false
    default: 'archive'

  install_path:
    description: 'Custom install path'
    required: false

  force:
    description: 'Force install'
    required: false

  export_path:
    description: 'Export to Path'
    required: false
    default: 'true'

  no_cache:
    description: 'Disable tool caching'
    required: false
    default: 'false'

  telemetry:
    description: 'Enable anonymous error telemetry'
    required: false
    default: 'true'

  custom_url:
    description: 'Custom Download URL'
    required: false

  version_tag:
    description: 'Version tag for custom download URL'
    required: false

  token:
    description: 'GitHub Token'
    required: false

outputs:
  path:
    description: 'Path to Elide'

  version:
    description: 'Installed Elide version'

  cached:
    description: 'Whether a cached installation was used'

  installer:
    description: 'Effective installer method used'

runs:
  using: node24
  main: dist/index.js
  post: dist/post.js
  post-if: always()
